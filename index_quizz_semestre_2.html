    :root{--bg1:#08111f;--bg2:#0f1f3c;--card:rgba(255,255,255,.1);--line:rgba(255,255,255,.12);--text:#f8fafc;--muted:#cbd5e1;--shadow:0 18px 45px rgba(0,0,0,.32);--radius:24px}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;color:var(--text);background:radial-gradient(circle at top,#1e3a8a 0%,var(--bg2) 35%,var(--bg1) 100%)}
    body{padding:calc(18px + env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom))}
    .app{max-width:1100px;margin:0 auto}
    .hero{background:linear-gradient(135deg,rgba(96,165,250,.18),rgba(167,139,250,.16));backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:32px;padding:22px;box-shadow:var(--shadow)}
    .title{font-size:clamp(30px,6vw,52px);font-weight:900;letter-spacing:-.04em;line-height:.95;margin:0}
    .grid{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;margin-top:16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);backdrop-filter:blur(14px);box-shadow:var(--shadow)}
    .section{padding:18px}
    .section h2{margin:0 0 14px;font-size:19px;letter-spacing:-.02em}
    .chips{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .chip{border:none;background:rgba(255,255,255,.09);color:var(--text);padding:14px 16px;border-radius:18px;font-size:15px;font-weight:800;cursor:pointer;border:1px solid transparent;text-align:left}
    .chip.active{background:linear-gradient(135deg,rgba(96,165,250,.28),rgba(167,139,250,.24));border-color:rgba(255,255,255,.16)}
    .controls{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    button,.fileLabel{appearance:none;border:none;border-radius:18px;padding:14px 16px;font-size:15px;font-weight:800;cursor:pointer}
    .primary{background:linear-gradient(135deg,#60a5fa,#818cf8);color:white}
    .secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line)}
    .danger{background:rgba(239,68,68,.15);color:#fecaca;border:1px solid rgba(239,68,68,.25)}
    .fileLabel input{display:none}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .stat{flex:1 1 140px;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:20px;padding:14px}
    .stat .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .stat .value{margin-top:4px;font-size:28px;font-weight:900;letter-spacing:-.04em}
    .quizWrap,.sheetView{display:none;margin-top:16px}
    .quizTop,.sheetTop{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
    .progressWrap{height:12px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;border:1px solid var(--line)}
    .progressBar{height:100%;width:0;background:linear-gradient(90deg,#60a5fa,#a78bfa);transition:.25s width}
    .questionCard,.sheetCard{padding:20px}
    .meta{font-size:13px;color:var(--muted);margin-bottom:12px}
    .question{font-size:27px;line-height:1.15;font-weight:900;letter-spacing:-.03em;margin:0 0 16px}
    .answers{display:grid;gap:10px}
    .answer{width:100%;text-align:left;background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--line);border-radius:18px;padding:15px 16px;font-size:16px;font-weight:700}
    .answer.correct{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.45)}
    .answer.wrong{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.45)}
    .explain{display:none;margin-top:14px;padding:14px;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--muted);font-size:15px;line-height:1.45}
    .list{display:grid;gap:10px}
    .item{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:12px 14px;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid var(--line)}
    .item small{color:var(--muted);display:block;margin-top:2px}
    textarea{width:100%;min-height:180px;background:rgba(6,11,22,.55);color:var(--text);border:1px solid var(--line);border-radius:18px;padding:14px;font:14px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace;resize:vertical}
    .muted{color:var(--muted);font-size:14px;line-height:1.45}.hidden{display:none!important}
    .sheetCard h3{margin:0 0 8px;font-size:28px;letter-spacing:-.03em}.sheetCard h4{margin:18px 0 10px;font-size:17px;letter-spacing:-.02em}
    .sheetLead{color:var(--muted);font-size:15px;line-height:1.5;margin:0 0 16px}
    .sheetBlocks{display:grid;gap:12px}.sheetBlock{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:20px;padding:16px}
    .sheetBlock ul{margin:0;padding-left:18px;display:grid;gap:8px}.sheetBlock li{line-height:1.45}
    .sheetGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.badgeRow{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:8px 10px;background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:999px;font-size:13px;font-weight:700;color:var(--text)}
    @media (max-width:860px){.grid{grid-template-columns:1fr}.question{font-size:23px}.sheetGrid,.chips{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1 class="title">QUIZZ HISTOIRE S2</h1>
    </section>

    <div class="grid">
      <section class="card section">
        <h2>Matières du deuxième semestre</h2>
        <div id="subjectChips" class="chips"></div>

        <div class="controls">
          <button id="openSheetBtn" class="secondary">Ouvrir la fiche</button>
          <button id="startBtn" class="primary">Commencer le quiz</button>
          <button id="reviewBtn" class="secondary">Mode révision</button>
          <button id="shuffleBtn" class="secondary">Mélanger questions</button>
        </div>

        <div class="row" style="margin-top:14px">
          <div class="stat"><div class="label">Questions</div><div id="questionsCount" class="value">0</div></div>
          <div class="stat"><div class="label">Meilleur score</div><div id="bestScore" class="value">0%</div></div>
          <div class="stat"><div class="label">Dernier score</div><div id="lastScore" class="value">0%</div></div>
        </div>

        <div id="sheetView" class="sheetView">
          <div class="sheetTop">
            <div style="font-weight:800" id="sheetTitleTop">Fiche de révision</div>
            <button id="closeSheetBtn" class="danger">Fermer la fiche</button>
          </div>
          <div class="card sheetCard"><div id="sheetContent"></div></div>
        </div>

        <div id="quizWrap" class="quizWrap">
          <div class="quizTop">
            <div style="font-weight:800" id="progressText">Question 1/1</div>
            <button id="quitBtn" class="danger">Quitter</button>
          </div>
          <div class="progressWrap"><div id="progressBar" class="progressBar"></div></div>
          <div class="card questionCard" style="margin-top:14px">
            <div id="questionMeta" class="meta"></div>
            <h3 id="questionText" class="question"></h3>
            <div id="answers" class="answers"></div>
            <div id="explain" class="explain"></div>
            <div class="controls" style="margin-top:14px"><button id="nextBtn" class="primary hidden">Question suivante</button></div>
          </div>
        </div>
      </section>

      <section class="card section">
        <h2>Personnaliser les questions</h2>
        <p class="muted">Le fichier JSON peut être importé directement. Les fiches détaillées restent intégrées dans l’appli.</p>
        <div class="controls">
          <label class="fileLabel secondary">Importer un JSON<input id="importFile" type="file" accept="application/json" /></label>
          <button id="exportBtn" class="secondary">Exporter la base</button>
          <button id="resetBtn" class="danger">Réinitialiser les scores</button>
        </div>
        <p class="muted" style="margin-top:16px">Format attendu :</p>
        <textarea id="jsonPreview" spellcheck="false"></textarea>
        <div class="controls"><button id="applyJsonBtn" class="primary">Appliquer ce JSON</button></div>
        <h2 style="margin-top:20px">Résultats par matière</h2>
        <div id="resultsList" class="list"></div>
      </section>
    </div>
  </div>

    const state = {data:null,selectedSubjectId:null,quizQuestions:[],currentIndex:0,score:0,reviewMode:false,awaitingNext:false,shuffled:false};
    const $ = (id) => document.getElementById(id);
    const STORAGE_DATA = 'quiz-histoire-s2-data';
    const STORAGE_SCORES = 'quiz-histoire-s2-scores';

    function normalizeId(id=''){ return String(id).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,''); }
    function resolveSheetKey(subject){ const raw = normalizeId(subject?.id || subject?.name || ''); return DEFAULT_SHEETS[raw] ? raw : null; }
    function loadData(){ try{ const saved = localStorage.getItem(STORAGE_DATA); state.data = saved ? JSON.parse(saved) : null; }catch(e){ state.data = null; } if(!state.data || !Array.isArray(state.data.subjects) || !state.data.subjects.length) state.data = DEFAULT_DATA; state.selectedSubjectId = state.data.subjects[0]?.id || null; $('jsonPreview').value = JSON.stringify(state.data, null, 2); }
    function saveData(){ localStorage.setItem(STORAGE_DATA, JSON.stringify(state.data)); $('jsonPreview').value = JSON.stringify(state.data, null, 2); }
    function getScores(){ try{return JSON.parse(localStorage.getItem(STORAGE_SCORES) || '{}')}catch(e){return {}} }
    function saveScores(scores){ localStorage.setItem(STORAGE_SCORES, JSON.stringify(scores)); }
    function currentSubject(){ return state.data.subjects.find(s => s.id === state.selectedSubjectId) || state.data.subjects[0]; }

    function renderSubjects(){
      const box = $('subjectChips'); box.innerHTML = '';
      state.data.subjects.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'chip' + (s.id === state.selectedSubjectId ? ' active' : '');
        btn.innerHTML = `<span>${s.name}</span>`;
        btn.onclick = () => { state.selectedSubjectId = s.id; renderSubjects(); updateStats(); openSheet(); };
        box.appendChild(btn);
      });
    }

    function updateStats(){
      const subject = currentSubject(); const scores = getScores(); const result = scores[subject.id] || {best:0,last:0,plays:0};
      $('questionsCount').textContent = subject.questions?.length || 0;
      $('bestScore').textContent = `${Math.round(result.best || 0)}%`;
      $('lastScore').textContent = `${Math.round(result.last || 0)}%`;
      renderResults();
    }

    function renderResults(){
      const list = $('resultsList'); const scores = getScores(); list.innerHTML = '';
      state.data.subjects.forEach(s => {
        const r = scores[s.id] || {best:0,last:0,plays:0};
        const div = document.createElement('div'); div.className = 'item';
        div.innerHTML = `<div><strong>${s.name}</strong><small>${s.questions?.length || 0} questions · ${r.plays || 0} essai(s)</small></div><div><strong>${Math.round(r.best || 0)}%</strong></div>`;
        list.appendChild(div);
      });
    }

    function renderList(title, arr){ return `<div class="sheetBlock"><h4>${title}</h4><ul>${(arr||[]).map(v => `<li>${v}</li>`).join('')}</ul></div>`; }

    function openSheet(){
      const subject = currentSubject(); const key = resolveSheetKey(subject); const sheet = key ? DEFAULT_SHEETS[key] : null;
      $('sheetView').style.display = 'block'; $('quizWrap').style.display = 'none'; $('sheetTitleTop').textContent = subject?.name || 'Fiche de révision';
      if(!sheet){ $('sheetContent').innerHTML = `<h3>${subject?.name || 'Matière'}</h3>`; return; }
      $('sheetContent').innerHTML = `
        <h3>${subject.name}</h3>
        <p class="sheetLead">${sheet.lead}</p>
        <div class="badgeRow">
          <span class="badge">Fiche active</span>
          <span class="badge">Repères essentiels</span>
          <span class="badge">Méthode de révision</span>
        </div>
        <div class="sheetBlocks" style="margin-top:14px">
          ${renderList('Objectifs à maîtriser', sheet.objectif)}
          <div class="sheetGrid">
            ${renderList('Repères chronologiques', sheet.reperes)}
            ${renderList('Notions à connaître', sheet.notions)}
          </div>
          ${renderList('Plan de révision conseillé', sheet.plan)}
          <div class="sheetGrid">
            ${renderList('Pièges à éviter', sheet.pieges)}
            ${renderList('Savoir-faire attendus', sheet.savoirFaire)}
          </div>
        </div>`;
    }

    function closeSheet(){ $('sheetView').style.display = 'none'; }
    function shuffleArray(arr){ const a=[...(arr||[])]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

    function startQuiz(reviewMode=false){
      const subject = currentSubject();
      if(!subject?.questions?.length){ alert('Aucune question dans cette matière.'); return; }
      state.reviewMode = reviewMode; state.currentIndex = 0; state.score = 0; state.awaitingNext = false;
      state.quizQuestions = state.shuffled ? shuffleArray(subject.questions) : [...subject.questions];
      $('sheetView').style.display = 'none'; $('quizWrap').style.display = 'block'; renderQuestion();
    }

    function renderQuestion(){
      const q = state.quizQuestions[state.currentIndex]; if(!q){ finishQuiz(); return; }
      $('progressText').textContent = `Question ${state.currentIndex + 1}/${state.quizQuestions.length}`;
      $('progressBar').style.width = `${(state.currentIndex / state.quizQuestions.length) * 100}%`;
      $('questionMeta').textContent = `${currentSubject().name} · ${q.chapter || 'Cours'} · ${q.difficulty || 'niveau libre'}`;
      $('questionText').textContent = q.question; $('explain').style.display = 'none'; $('explain').textContent = q.explanation || '';
      $('nextBtn').classList.add('hidden'); const answers = $('answers'); answers.innerHTML = '';
      (q.answers || []).forEach((answer, idx) => {
        const btn = document.createElement('button'); btn.className = 'answer'; btn.textContent = answer; btn.onclick = () => chooseAnswer(idx, btn); answers.appendChild(btn);
      });
    }

    function chooseAnswer(index, clickedBtn){
      if(state.awaitingNext) return; state.awaitingNext = true;
      const q = state.quizQuestions[state.currentIndex]; const buttons = [...document.querySelectorAll('.answer')];
      buttons.forEach((b,i) => { b.disabled = true; if(i === q.correctIndex) b.classList.add('correct'); });
      if(index !== q.correctIndex) clickedBtn.classList.add('wrong'); else state.score++;
      if(state.reviewMode || q.explanation) $('explain').style.display = 'block';
      $('nextBtn').classList.remove('hidden');
    }

    function nextQuestion(){ state.currentIndex++; state.awaitingNext = false; $('progressBar').style.width = `${(state.currentIndex / state.quizQuestions.length) * 100}%`; renderQuestion(); }
    function finishQuiz(){
      const total = state.quizQuestions.length || 1; const percent = Math.round((state.score / total) * 100); const subject = currentSubject();
      const scores = getScores(); const prev = scores[subject.id] || {best:0,last:0,plays:0};
      scores[subject.id] = {best: Math.max(prev.best || 0, percent), last: percent, plays: (prev.plays || 0) + 1}; saveScores(scores); updateStats();
      $('progressText').textContent = 'Terminé'; $('questionMeta').textContent = subject.name; $('questionText').textContent = `Score final : ${state.score}/${total} · ${percent}%`;
      $('answers').innerHTML = ''; $('explain').style.display = 'block'; $('explain').textContent = percent >= 80 ? 'Très bon niveau.' : 'Refais ce quiz en mode révision puis reprends la fiche détaillée de la matière.'; $('nextBtn').classList.add('hidden'); $('progressBar').style.width = '100%';
    }
    function quitQuiz(){ $('quizWrap').style.display = 'none'; }

    function applyJson(){
      try{
        const parsed = JSON.parse($('jsonPreview').value);
        if(!parsed.subjects || !Array.isArray(parsed.subjects)) throw new Error('Format invalide');
        state.data = parsed; state.selectedSubjectId = parsed.subjects[0]?.id || null; saveData(); renderSubjects(); updateStats(); openSheet(); alert('Nouvelle base appliquée.');
      }catch(e){ alert('JSON invalide. Vérifiez la structure.'); }
    }
    function importJsonFile(file){ const reader = new FileReader(); reader.onload = () => { $('jsonPreview').value = reader.result; applyJson(); }; reader.readAsText(file, 'utf-8'); }
    function exportJson(){ const blob = new Blob([JSON.stringify(state.data, null, 2)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'quiz-histoire-s2-data.json'; a.click(); URL.revokeObjectURL(a.href); }
    function resetScores(){ localStorage.removeItem(STORAGE_SCORES); updateStats(); alert('Scores réinitialisés.'); }

    $('openSheetBtn').onclick = openSheet;
    $('closeSheetBtn').onclick = closeSheet;
    $('startBtn').onclick = () => startQuiz(false);
    $('reviewBtn').onclick = () => startQuiz(true);
    $('shuffleBtn').onclick = () => { state.shuffled = !state.shuffled; $('shuffleBtn').textContent = state.shuffled ? 'Mélange activé' : 'Mélanger questions'; $('shuffleBtn').classList.toggle('primary', state.shuffled); $('shuffleBtn').classList.toggle('secondary', !state.shuffled); };
    $('nextBtn').onclick = nextQuestion; $('quitBtn').onclick = quitQuiz; $('applyJsonBtn').onclick = applyJson; $('exportBtn').onclick = exportJson; $('resetBtn').onclick = resetScores;
    $('importFile').addEventListener('change', e => { const file = e.target.files?.[0]; if(file) importJsonFile(file); e.target.value = ''; });

    loadData(); renderSubjects(); updateStats(); openSheet();
  </script>
